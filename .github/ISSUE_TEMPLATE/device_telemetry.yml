---
name: Device profile (telemetry)
description: Anonymized Enki hardware profile for support prioritization
title: "[telemetry] Manufacturer device kind · detail — reason"
labels:
  - device-telemetry
  - telemetry-unsupported
body:
  - type: markdown
    attributes:
      value: |
        Issues with the `device-telemetry` label are often created from a **pre-filled GitHub link**
        in Home Assistant (opt-in telemetry). Nothing is sent automatically.

        Do **not** include home/node IDs, email, passwords, or room names.

        Prefer the HA notification link — titles, labels, and fields are filled from the
        anonymized profile (manufacturer, referentiel device ID, device kind, reason).

        **Common labels:** `device-telemetry` + one of `telemetry-unsupported`,
        `telemetry-capability-gap`, `telemetry-api-error` + `device-*` + optional `brand-*`.
  - type: input
    attributes:
      label: Manufacturer
      placeholder: Lexman, Inspire, Equation, …
    validations:
      required: true
  - type: input
    attributes:
      label: Device kind (human-readable)
      description: e.g. remote control, motorization, ceiling fan
      placeholder: remote control
    validations:
      required: false
  - type: input
    attributes:
      label: Referentiel device ID
      description: Catalog hardware ID from diagnostics (not the node ID)
      placeholder: 651eada55b3a798ef6b6bc5c
    validations:
      required: false
  - type: input
    attributes:
      label: Referentiel type
      placeholder: remote_controls_and_switches, access_and_motorizations, …
    validations:
      required: true
  - type: textarea
    attributes:
      label: Capabilities (JSON array or list)
    validations:
      required: false
  - type: textarea
    attributes:
      label: Possible values (JSON)
    validations:
      required: false
  - type: input
    attributes:
      label: Integration version
      placeholder: 1.6.12
    validations:
      required: false
  - type: input
    attributes:
      label: Home Assistant version
      placeholder: 2025.1.0
    validations:
      required: false
