name: Stale issues and PRs

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-label: stale
          stale-pr-label: stale
          days-before-issue-stale: 60
          days-before-pr-stale: 45
          days-before-issue-close: -1
          days-before-pr-close: -1
          exempt-issue-labels: blocked,next-release,release-blocker,device-telemetry
          exempt-pr-labels: blocked,next-release,release-blocker
          stale-issue-message: >
            This issue has had no activity for 60 days. It has been marked stale.
            Comment or remove the `stale` label to keep it open.
          stale-pr-message: >
            This pull request has had no activity for 45 days. It has been marked stale.
            Push a commit or remove the `stale` label to keep it open.
