name: Release

on:
  release:
    types:
      - published

permissions: {}

jobs:
  validate-apk-keys:
    name: Validate gateway keys (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect APK URL secret
        id: apk
        env:
          ENKI_APK_URL: ${{ secrets.ENKI_APK_URL }}
        run: |
          if [ -n "$ENKI_APK_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install jadx
        if: steps.apk.outputs.configured == 'true'
        shell: bash
        run: |
          JADX_VERSION=1.5.1
          curl -fsSL "https://github.com/skylot/jadx/releases/download/v${JADX_VERSION}/jadx-${JADX_VERSION}.zip" -o jadx.zip
          unzip -q jadx.zip
          echo "$PWD/jadx-${JADX_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Download Enki APK
        if: steps.apk.outputs.configured == 'true'
        shell: bash
        env:
          ENKI_APK_URL: ${{ secrets.ENKI_APK_URL }}
        run: curl -fsSL "$ENKI_APK_URL" -o enki.apk

      - name: Compare APK keys with gateway_keys_data.py
        if: steps.apk.outputs.configured == 'true'
        run: python3 scripts/extract_gateway_keys.py enki.apk --check

      - name: Skip APK validation
        if: steps.apk.outputs.configured != 'true'
        run: echo "ENKI_APK_URL secret not configured — skipping APK key validation"

  release:
    name: Release assets
    runs-on: ubuntu-latest
    needs:
      - validate-apk-keys
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set manifest version from tag
        shell: bash
        run: |
          python3 <<'PY'
          import json
          from pathlib import Path

          manifest = Path("custom_components/enki/manifest.json")
          data = json.loads(manifest.read_text())
          data["version"] = "${{ github.event.release.tag_name }}".lstrip("v")
          manifest.write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: ZIP integration for HACS
        shell: bash
        run: |
          cd "${{ github.workspace }}/custom_components/enki"
          zip -r enki.zip .

      - name: Upload ZIP to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ github.workspace }}/custom_components/enki/enki.zip
