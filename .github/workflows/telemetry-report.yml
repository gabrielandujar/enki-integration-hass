name: Device telemetry

on:
  repository_dispatch:
    types: [enki-device-report]

permissions:
  contents: read
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub issues from telemetry payload
        uses: actions/github-script@v7
        with:
          script: |
            const raw = context.payload.client_payload?.profiles_json;
            if (!raw) {
              core.setFailed("Missing profiles_json in client_payload");
              return;
            }

            const profiles = JSON.parse(raw);
            if (!Array.isArray(profiles) || profiles.length === 0) {
              core.info("No profiles to process");
              return;
            }

            const labels = ["device-telemetry", "enhancement"];

            for (const profile of profiles) {
              const deviceType = profile.device_type ?? "unknown";
              const model = profile.model ?? "unknown";
              const supported = profile.supported_by_integration === true;
              const title = supported
                ? `[telemetry] Profil ${deviceType} — ${model}`
                : `[telemetry] Appareil non supporté — ${deviceType} (${model})`;

              const capabilities = (profile.capabilities ?? [])
                .map((cap) => `- \`${cap}\``)
                .join("\n") || "- _(aucune)_";

              const body = [
                "## Profil appareil Enki (télémétrie opt-in)",
                "",
                "Rapport automatique — données anonymisées, sans identifiant de compte ou de domicile.",
                "",
                `- **Type référentiel** : \`${deviceType}\``,
                `- **Type BFF** : \`${profile.bff_device_type ?? ""}\``,
                `- **Fabricant** : ${profile.manufacturer ?? "inconnu"}`,
                `- **Modèle** : ${model}`,
                `- **Firmware** : ${profile.firmware_version ?? "inconnu"}`,
                `- **Supporté par l'intégration** : ${supported ? "oui" : "non"}`,
                `- **Version intégration** : \`${profile.integration_version ?? ""}\``,
                `- **Home Assistant** : \`${profile.ha_version ?? ""}\``,
                `- **Empreinte** : \`${String(profile.fingerprint ?? "").slice(0, 16)}\``,
                "",
                "### Capabilities",
                capabilities,
                "",
                "### Possible values",
                "```json",
                JSON.stringify(profile.possible_values ?? {}, null, 2),
                "```",
                "",
              ].join("\n");

              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "all",
                labels: "device-telemetry",
                per_page: 100,
              });

              const fingerprint = profile.fingerprint ?? "";
              const duplicate = existing.data.find(
                (issue) => issue.body && issue.body.includes(`Empreinte** : \`${fingerprint.slice(0, 16)}\``),
              );

              if (duplicate) {
                core.info(`Skipping duplicate profile ${fingerprint.slice(0, 16)} (issue #${duplicate.number})`);
                continue;
              }

              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
              core.info(`Created issue #${created.data.number} for ${deviceType}`);
            }
